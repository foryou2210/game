<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Simulator - Flash News Edition</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --primary-blue: #4a90e2;
            --accent-red: #ff5252;
            --accent-blue: #536dfe;
            --border-color: #444;
            --news-gold: #ffca28;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; justify-content: center; }
        #container { width: 100%; max-width: 1100px; display: flex; flex-direction: column; gap: 15px; }

        /* 헤더 & 뉴스 전광판 */
        .header { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); text-align: center; }
        .news-bar { 
            background: #252525; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: center; height: 50px; margin-top: 10px;
        }
        #news-display { font-size: 1.1rem; font-weight: 600; text-align: center; transition: 0.3s; }

        /* 뉴스 깜박임 애니메이션 */
        .blink { animation: blink-animation 1s steps(2, start) infinite; }
        @keyframes blink-animation { to { visibility: hidden; } }

        /* 타이머 및 보드 레이아웃 (기존과 동일) */
        #time-display { font-size: 1.1rem; color: var(--primary-blue); font-weight: bold; margin-bottom: 5px; }
        .board { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 10px; }
        .stock-btn { 
            background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color);
            padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; align-items: center;
        }
        .stock-btn:hover { border-color: var(--primary-blue); background: #383838; }
        .stock-btn.active { border: 2px solid var(--primary-blue); background: #3d3d3d; }
        .change-rate { font-size: 0.85rem; font-weight: bold; }

        .main-content { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; }
        .panel { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
        .selected-name { font-size: 1.4rem; margin-bottom: 15px; color: var(--primary-blue); text-align: center; font-weight: bold; }
        input { 
            width: 100%; background: #1e1e1e; border: 1px solid var(--border-color); color: white; 
            padding: 12px; border-radius: 5px; text-align: right; font-size: 1.1rem; margin-bottom: 5px;
        }
        #trade-preview { text-align: right; font-size: 0.9rem; color: #888; margin-bottom: 15px; }
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
        .btn-buy { background: var(--accent-red); }
        .btn-sell { background: var(--accent-blue); }
        .asset-info { margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border-color); font-size: 1.1rem; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid var(--border-color); }
        .up { color: var(--accent-red); }
        .down { color: var(--accent-blue); }
    </style>
</head>
<body>

<div id="container">
    <div class="header">
        <h1>실시간 주식 시뮬레이터</h1>
        <div id="time-display">다음 변동까지: <span id="timer">30</span>초</div>
        <div class="news-bar">
            <div id="news-display" style="color: var(--news-gold);">
                [안내] 30초마다 전 세계 경제 소식이 업데이트됩니다.
            </div>
        </div>
    </div>

    <div class="board" id="stock-board"></div>

    <div class="main-content">
        <div class="panel">
            <div class="selected-name" id="selected-title">종목 선택</div>
            <input type="number" id="trade-qty" placeholder="수량 입력" oninput="calculatePreview()">
            <div id="trade-preview">예상 금액: <span id="total-preview" style="color: var(--news-gold); font-weight: bold;">0</span> 원</div>
            <div class="btn-group">
                <button class="btn btn-buy" onclick="executeTrade('buy')">매수</button>
                <button class="btn btn-sell" onclick="executeTrade('sell')">매도</button>
            </div>
            <div class="asset-info">
                보유 자산: <span id="user-asset" style="color: #ffca28; font-weight: bold;">1,000,000</span> 원
            </div>
        </div>

        <div class="panel" style="overflow-x: auto;">
            <h3 style="margin-bottom: 10px;">내 포트폴리오</h3>
            <table>
                <thead>
                    <tr>
                        <th>종목</th>
                        <th>보유량</th>
                        <th>평단가</th>
                        <th>현재가</th>
                        <th>수익률</th>
                    </tr>
                </thead>
                <tbody id="portfolio-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let asset = 1000000;
    let selectedId = null;
    let timeLeft = 30;

    const stocks = [
        { id: 'os', name: '오성전자', price: 1000, oldPrice: 1000, owned: 0, totalCost: 0, nextImpact: 0 },
        { id: 'mr', name: '미래자동차', price: 1000, oldPrice: 1000, owned: 0, totalCost: 0, nextImpact: 0 },
        { id: 'pp', name: '파파야게임즈', price: 1000, oldPrice: 1000, owned: 0, totalCost: 0, nextImpact: 0 },
        { id: 'rg', name: '알지화학', price: 1000, oldPrice: 1000, owned: 0, totalCost: 0, nextImpact: 0 },
        { id: 'ts', name: '떼쓸라', price: 1000, oldPrice: 1000, owned: 0, totalCost: 0, nextImpact: 0 },
        { id: 'co', name: '고가콜라', price: 1000, oldPrice: 1000, owned: 0, totalCost: 0, nextImpact: 0 },
        { id: 'dg', name: '뒤즈니', price: 1000, oldPrice: 1000, owned: 0, totalCost: 0, nextImpact: 0 },
        { id: 'np', name: '넷플렉스', price: 1000, oldPrice: 1000, owned: 0, totalCost: 0, nextImpact: 0 }
    ];

    const newsList = [
        { text: "오성전자, 차세대 반도체 수주 성공! 주가 급등 예고", target: "os", impact: 0.25 },
        { text: "오성전자 공장 가동 중단 소식에 반도체 수급 우려", target: "os", impact: -0.2 },
        { text: "미래자동차, 자율주행 소프트웨어 혁신으로 선주문 폭주", target: "mr", impact: 0.2 },
        { text: "미래자동차, 배터리 결함으로 인한 대규모 리콜 결정", target: "mr", impact: -0.3 },
        { text: "파파야게임즈, 신작 출시 당일 매출 500억 달성", target: "pp", impact: 0.35 },
        { text: "파파야게임즈, 게임 내 개인정보 유출 사고 발생", target: "pp", impact: -0.25 },
        { text: "알지화학, 차세대 전고체 배터리 양산 체제 구축", target: "rg", impact: 0.2 },
        { text: "알지화학, 원자재 가격 폭등으로 수익성 하락 전망", target: "rg", impact: -0.15 },
        { text: "떼쓸라, 전기차 충전 네트워크 전면 개방 발표", target: "ts", impact: 0.15 },
        { text: "떼쓸라 CEO, SNS를 통한 돌발 발언으로 시장 혼조세", target: "ts", impact: -0.2 },
        { text: "고가콜라, 한정판 굿즈 열풍에 실적 최고치 경신", target: "co", impact: 0.1 },
        { text: "고가콜라, 건강 음료 선호에 따른 탄산 판매 감소", target: "co", impact: -0.12 },
        { text: "뒤즈니, 테마파크 방문객 회복 및 흑자 전환", target: "dg", impact: 0.18 },
        { text: "뒤즈니, 기대작 개봉 연기 발표로 실망 매물 출현", target: "dg", impact: -0.15 },
        { text: "넷플렉스, 광고 요금제 안착에 따른 가입자 급증", target: "np", impact: 0.15 },
        { text: "넷플렉스, 계정 공유 금지로 사용자 이탈 우려", target: "np", impact: -0.1 }
    ];

    function init() {
        const board = document.getElementById('stock-board');
        const portfolio = document.getElementById('portfolio-body');
        stocks.forEach(s => {
            board.innerHTML += `<button class="stock-btn" id="btn-${s.id}" onclick="selectStock('${s.id}')"><span>${s.name}</span><div style="text-align:right"><div id="price-${s.id}">${s.price.toLocaleString()}</div><div class="change-rate" id="rate-board-${s.id}">0%</div></div></button>`;
            portfolio.innerHTML += `<tr id="row-${s.id}"><td>${s.name}</td><td id="owned-${s.id}">0</td><td id="avg-${s.id}">0</td><td id="curr-${s.id}">${s.price.toLocaleString()}</td><td id="yield-${s.id}">0%</td></tr>`;
        });
        updateUI();
    }

    function selectStock(id) {
        selectedId = id;
        document.getElementById('selected-title').innerText = stocks.find(s => s.id === id).name;
        document.querySelectorAll('.stock-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-${id}`).classList.add('active');
        calculatePreview();
    }

    function calculatePreview() {
        const qty = Number(document.getElementById('trade-qty').value);
        const previewEl = document.getElementById('total-preview');
        if (!selectedId || qty <= 0) { previewEl.innerText = "0"; return; }
        const stock = stocks.find(s => s.id === selectedId);
        previewEl.innerText = (stock.price * qty).toLocaleString();
    }

    function executeTrade(type) {
        if (!selectedId) return alert('종목을 선택하세요!');
        const qty = Number(document.getElementById('trade-qty').value);
        if (qty <= 0) return alert('정확한 수량을 입력하세요!');
        const stock = stocks.find(s => s.id === selectedId);
        const total = stock.price * qty;
        if (type === 'buy') {
            if (asset < total) return alert('자산 부족!');
            asset -= total; stock.totalCost += total; stock.owned += qty;
        } else {
            if (stock.owned < qty) return alert('보유량 부족!');
            asset += total; const avg = stock.totalCost / stock.owned; stock.owned -= qty; stock.totalCost = stock.owned * avg;
        }
        document.getElementById('trade-qty').value = '';
        updateUI();
    }

    function updatePrices() {
        stocks.forEach(s => {
            let change = (Math.random() * 0.6) - 0.3;
            if (s.nextImpact) { change += s.nextImpact; s.nextImpact = 0; }
            s.oldPrice = s.price;
            s.price = Math.max(100, Math.floor(s.price * (1 + change)));
        });

        // 뉴스 로직: 깜박임 적용
        const newsEl = document.getElementById('news-display');
        const news = newsList[Math.floor(Math.random() * newsList.length)];
        
        newsEl.innerText = `[속보] ${news.text}`;
        newsEl.classList.add('blink'); // 깜박임 시작
        
        if (news.impact > 0) newsEl.style.color = "var(--accent-red)";
        else if (news.impact < 0) newsEl.style.color = "var(--accent-blue)";
        else newsEl.style.color = "var(--news-gold)";

        if(news.target) {
            const targetStock = stocks.find(s => s.id === news.target);
            if(targetStock) targetStock.nextImpact = news.impact;
        }

        // 10초 후 깜박임 멈추고 기본 문구로 복귀
        setTimeout(() => {
            newsEl.classList.remove('blink');
            newsEl.innerText = "[안내] 30초마다 전 세계 경제 소식이 업데이트됩니다.";
            newsEl.style.color = "var(--news-gold)";
        }, 10000);

        updateUI();
    }

    function updateUI() {
        stocks.forEach(s => {
            document.getElementById(`price-${s.id}`).innerText = s.price.toLocaleString();
            const diff = ((s.price - s.oldPrice) / s.oldPrice * 100).toFixed(2);
            const rb = document.getElementById(`rate-board-${s.id}`);
            rb.innerText = (diff > 0 ? '▲' : (diff < 0 ? '▼' : '')) + Math.abs(diff) + '%';
            rb.className = 'change-rate ' + (diff > 0 ? 'up' : (diff < 0 ? 'down' : ''));
            document.getElementById(`owned-${s.id}`).innerText = s.owned.toLocaleString();
            const avg = s.owned > 0 ? Math.floor(s.totalCost / s.owned) : 0;
            document.getElementById(`avg-${s.id}`).innerText = avg.toLocaleString();
            document.getElementById(`curr-${s.id}`).innerText = s.price.toLocaleString();
            const yEl = document.getElementById(`yield-${s.id}`);
            if (s.owned > 0) {
                const yRate = ((s.price - avg) / avg * 100).toFixed(2);
                yEl.innerText = yRate + '%'; yEl.className = yRate > 0 ? 'up' : (yRate < 0 ? 'down' : '');
            } else { yEl.innerText = '0%'; yEl.className = ''; }
        });
        document.getElementById('user-asset').innerText = Math.floor(asset).toLocaleString();
        calculatePreview();
    }

    setInterval(() => {
        timeLeft--;
        document.getElementById('timer').innerText = timeLeft;
        if (timeLeft <= 0) { updatePrices(); timeLeft = 30; }
    }, 1000);

    init();
</script>
</body>
</html>
